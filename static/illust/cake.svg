<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- plate -->
  <ellipse cx="60" cy="100" rx="45" ry="6" fill="#FBBD40" stroke="#3A1F54" stroke-width="2.5"/>
  <!-- bottom layer -->
  <rect x="25" y="72" width="70" height="28" rx="4" fill="#FBBD40" stroke="#3A1F54" stroke-width="2.8"/>
  <!-- top layer -->
  <rect x="32" y="48" width="56" height="26" rx="4" fill="#FBBD40" stroke="#3A1F54" stroke-width="2.8"/>
  <!-- cream drip -->
  <path d="M32 50c2 6 5 8 8 6s4-6 8-4 5 8 8 6 3-6 7-5 5 7 8 5 4-5 7-4 4 6 8 4" stroke="#FFFDF9" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- candle -->
  <rect x="56" y="30" width="8" height="20" rx="3" fill="#FFFDF9" stroke="#3A1F54" stroke-width="2"/>
  <!-- flame -->
  <path d="M60 20c0-6 4-10 4-10s4 4 4 10c0 4-2 6-4 6s-4-2-4-6z" fill="#FBBD40" stroke="#3A1F54" stroke-width="1.5"/>
  <!-- face -->
  <circle cx="50" cy="62" r="2" fill="#3A1F54"/>
  <circle cx="66" cy="62" r="2" fill="#3A1F54"/>
  <circle cx="51" cy="60.8" r="0.8" fill="#FFFDF9"/>
  <circle cx="67" cy="60.8" r="0.8" fill="#FFFDF9"/>
  <path d="M52 67q4 3 8 0" stroke="#3A1F54" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <!-- blush -->
  <ellipse cx="44" cy="66" rx="3.5" ry="2" fill="#F5A623" opacity="0.3"/>
  <ellipse cx="72" cy="66" rx="3.5" ry="2" fill="#F5A623" opacity="0.3"/>
  <!-- cherry -->
  <circle cx="60" cy="44" r="4" fill="#E85D5D" stroke="#3A1F54" stroke-width="1.5"/>
  <path d="M60 40c1-4 3-6 5-6" stroke="#3A1F54" stroke-width="1.2" stroke-linecap="round" fill="none"/>
</svg>
